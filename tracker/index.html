<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dial Tracker — Front Desk AI</title>
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#1b2748" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --navy1:oklch(0.26 0.06 255);--navy2:oklch(0.22 0.055 258);--paper:oklch(0.98 0.006 255);
    --ink:oklch(0.24 0.03 255);--muted:oklch(0.5 0.02 255);--line:oklch(0.9 0.01 255);--surface:#fff;
    --emerald:oklch(0.62 0.15 155);--emerald-tint:oklch(0.95 0.045 155);
    --slate:oklch(0.55 0.02 255);--sky:oklch(0.6 0.13 240);--amber:oklch(0.72 0.15 65);
    --indigo:oklch(0.5 0.16 275);--rose:oklch(0.6 0.18 15);--violet:oklch(0.52 0.19 300);--orange:oklch(0.68 0.18 45);
  }
  *{box-sizing:border-box;margin:0}
  body{font-family:'Figtree',-apple-system,sans-serif;background:var(--paper);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  h1,h2,h3{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;letter-spacing:-.02em}
  .app{max-width:640px;margin:0 auto;padding:0 0 60px}
  /* header */
  .thead{position:sticky;top:0;z-index:10;background:linear-gradient(160deg,var(--navy1),var(--navy2));color:#fff;padding:16px 18px;display:flex;align-items:center;gap:12px}
  .thead .tile{width:40px;height:40px;border-radius:12px;background:oklch(1 0 0 / .1);display:grid;place-items:center;flex:none}
  .thead .tile svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2}
  .thead h1{font-size:19px;line-height:1.1}
  .thead small{display:block;color:oklch(0.82 0.03 255);font-size:12px;font-weight:600}
  .flame{margin-left:auto;display:flex;align-items:center;gap:7px;background:oklch(1 0 0 / .1);border-radius:999px;padding:8px 14px;font-weight:800;font-size:15px}
  .flame span{font-size:12px;font-weight:600;color:oklch(0.82 0.03 255)}
  /* tabs */
  .toggle{display:flex;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:5px;margin:16px 18px 0}
  .toggle button{flex:1;border:0;background:none;font-family:'Figtree';font-weight:700;font-size:15px;padding:11px;border-radius:999px;color:var(--muted);cursor:pointer}
  .toggle button.on{background:linear-gradient(160deg,var(--navy1),var(--navy2));color:#fff}
  .pane{padding:16px 18px}
  /* scoreboard */
  .scores{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .stat{background:var(--surface);border:1.5px solid var(--line);border-radius:16px;padding:14px 10px;text-align:center;transition:.2s}
  .stat.hit{background:var(--emerald-tint);border-color:var(--emerald)}
  .stat .n{font-family:'Bricolage Grotesque';font-weight:800;font-size:30px;line-height:1}
  .stat .lbl{font-size:11.5px;font-weight:700;color:var(--ink);margin-top:4px;line-height:1.15}
  .stat .goal{font-size:11px;color:var(--muted);margin-top:2px}
  .stat.hit .goal::before{content:"✓ ";color:var(--emerald);font-weight:800}
  /* log card */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px;margin-top:16px}
  .card h2{font-size:16px;margin-bottom:12px}
  .co-input{width:100%;font-family:'Figtree';font-size:15px;padding:12px 14px;border:1.5px solid var(--line);border-radius:12px;margin-bottom:12px;background:var(--paper)}
  .co-input:focus{outline:none;border-color:var(--navy1)}
  .btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .ob{border:1.5px solid var(--line);background:var(--surface);font-family:'Figtree';font-weight:700;font-size:14.5px;padding:14px 10px;border-radius:14px;cursor:pointer;transition:transform .1s;color:var(--ink);display:flex;align-items:center;justify-content:center;gap:7px}
  .ob:active{transform:scale(.95)}
  .ob .dot{width:9px;height:9px;border-radius:50%;flex:none}
  .ob.no_answer .dot{background:var(--slate)} .ob.no_answer{border-color:oklch(0.55 0.02 255 / .4)}
  .ob.voicemail .dot{background:var(--sky)} .ob.voicemail{border-color:oklch(0.6 0.13 240 / .4)}
  .ob.gatekeeper .dot{background:var(--amber)} .ob.gatekeeper{border-color:oklch(0.72 0.15 65 / .45)}
  .ob.conversation .dot{background:var(--indigo)} .ob.conversation{border-color:oklch(0.5 0.16 275 / .4)}
  .ob.demo_sent .dot{background:var(--emerald)} .ob.demo_sent{border-color:oklch(0.62 0.15 155 / .45)}
  .ob.not_interested .dot{background:var(--rose)} .ob.not_interested{border-color:oklch(0.6 0.18 15 / .4)}
  .ob.meeting .dot{background:var(--violet)} .ob.meeting{border-color:oklch(0.52 0.19 300 / .4)}
  .ob.close{grid-column:1 / -1;border:2px solid var(--orange);color:oklch(0.5 0.16 45);font-size:17px;font-weight:800;padding:17px}
  .rowbtns{display:flex;gap:10px;margin-top:12px}
  .rowbtns button{flex:1;border:1px solid var(--line);background:var(--surface);font-family:'Figtree';font-weight:600;font-size:13.5px;padding:11px;border-radius:12px;color:var(--muted);cursor:pointer}
  .rowbtns button:active{transform:scale(.97)}
  /* log list */
  .log{margin-top:16px}
  .log h2{font-size:15px;margin-bottom:10px;color:var(--muted)}
  .lrow{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid var(--line)}
  .code{width:34px;height:26px;border-radius:7px;display:grid;place-items:center;font-size:11.5px;font-weight:800;color:#fff;flex:none}
  .lrow .co{font-weight:600;font-size:14.5px;flex:1}
  .lrow .co.none{color:var(--muted);font-style:italic;font-weight:400}
  .lrow .tm{color:var(--muted);font-size:13px}
  .empty{color:var(--muted);text-align:center;padding:24px 10px;font-size:14.5px}
  /* history */
  .exp{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(160deg,var(--navy1),var(--navy2));color:#fff;border:0;font-family:'Figtree';font-weight:700;font-size:14px;padding:11px 18px;border-radius:999px;cursor:pointer;margin-bottom:14px}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{padding:10px 6px;text-align:center;border-bottom:1px solid var(--line)}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700}
  td:first-child,th:first-child{text-align:left}
  td.dials-hit{color:var(--emerald);font-weight:800}
  td.close-hit{color:var(--orange);font-weight:800}
  .foot{color:var(--muted);font-size:12.5px;margin-top:18px;line-height:1.5}
  /* toast */
  #toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-weight:600;font-size:14.5px;padding:13px 20px;border-radius:14px;box-shadow:0 12px 30px -8px oklch(0.26 0.06 255 / .5);opacity:0;pointer-events:none;transition:.3s;max-width:90vw;text-align:center;z-index:50}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <header class="thead">
    <span class="tile"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h4l2 5-3 2a11 11 0 0 0 5 5l2-3 5 2v4a2 2 0 0 1-2 2A16 16 0 0 1 3 6a2 2 0 0 1 2-2z"/></svg></span>
    <div><h1>Dial Tracker</h1><small>Front Desk AI · war room</small></div>
    <span class="flame">🔥 <b id="flameN">0</b> <span>dials</span></span>
  </header>

  <div class="toggle">
    <button id="tabToday" class="on">Today</button>
    <button id="tabHist">History</button>
  </div>

  <!-- TODAY -->
  <div class="pane" id="paneToday">
    <div class="scores" id="scores"></div>

    <div class="card">
      <h2>Log a call</h2>
      <input class="co-input" id="company" placeholder="Company (optional) — e.g. TMC Roofing" autocomplete="off" />
      <div class="btns" id="btns"></div>
      <div class="rowbtns">
        <button id="undo">↩ Undo last</button>
        <button id="clear">🗑 Clear today</button>
      </div>
    </div>

    <div class="log">
      <h2>Today's log</h2>
      <div id="todayLog"></div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="pane" id="paneHist" style="display:none">
    <button class="exp" id="exportCsv">⬇ Export CSV</button>
    <div id="histTable"></div>
    <p class="foot">Data is stored on this device (localStorage). Log calls from one device — your phone — and export the CSV weekly as backup.</p>
  </div>
</div>

<div id="toast"></div>

<script>
(function(){
  "use strict";
  var KEY="fd_call_log_v1";
  var OUTCOMES=[
    {k:"no_answer",label:"No answer",code:"NA"},
    {k:"voicemail",label:"Voicemail + text",code:"VM"},
    {k:"gatekeeper",label:"Gatekeeper",code:"GK"},
    {k:"conversation",label:"Conversation",code:"CV"},
    {k:"demo_sent",label:"Demo sent",code:"DM"},
    {k:"not_interested",label:"Not interested",code:"NI"},
    {k:"meeting",label:"Meeting booked",code:"MT"},
    {k:"close",label:"CLOSE 🎉",code:"CL"}
  ];
  var CODEMAP={};OUTCOMES.forEach(function(o){CODEMAP[o.k]=o;});
  var COLOR={no_answer:"oklch(0.55 0.02 255)",voicemail:"oklch(0.6 0.13 240)",gatekeeper:"oklch(0.72 0.15 65)",conversation:"oklch(0.5 0.16 275)",demo_sent:"oklch(0.62 0.15 155)",not_interested:"oklch(0.6 0.18 15)",meeting:"oklch(0.52 0.19 300)",close:"oklch(0.68 0.18 45)"};
  var NOT_DIAL={meeting:1,close:1};
  var CONVO={conversation:1,demo_sent:1,not_interested:1};

  function load(){try{return JSON.parse(localStorage.getItem(KEY))||[];}catch(e){return [];}}
  function save(a){localStorage.setItem(KEY,JSON.stringify(a));}
  function today(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
  function nowTime(){var d=new Date();return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
  function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

  var log=load();

  function todaysEntries(){var t=today();return log.filter(function(e){return e.date===t;});}
  function stat(entries){
    var s={dials:0,convos:0,demos:0,vms:0,mtgs:0,closes:0};
    entries.forEach(function(e){
      if(!NOT_DIAL[e.outcome])s.dials++;
      if(CONVO[e.outcome])s.convos++;
      if(e.outcome==="demo_sent")s.demos++;
      if(e.outcome==="voicemail")s.vms++;
      if(e.outcome==="meeting")s.mtgs++;
      if(e.outcome==="close")s.closes++;
    });
    return s;
  }

  var SCORE_DEFS=[
    {key:"dials",label:"Dials",goal:"60–80",min:60},
    {key:"convos",label:"Conversations",goal:"6–10",min:6},
    {key:"demos",label:"Demo texts",goal:"4–6",min:4},
    {key:"vms",label:"VM + follow-up",goal:"30–40",min:30},
    {key:"mtgs",label:"Meetings",goal:"1–2",min:1},
    {key:"closes",label:"Closes",goal:"1/wk",min:1}
  ];

  var $=function(id){return document.getElementById(id);};

  function renderScores(){
    var s=stat(todaysEntries());
    $("flameN").textContent=s.dials;
    $("scores").innerHTML=SCORE_DEFS.map(function(d){
      var v=s[d.key],hit=v>=d.min;
      return '<div class="stat'+(hit?' hit':'')+'"><div class="n">'+v+'</div><div class="lbl">'+d.label+'</div><div class="goal">goal '+d.goal+'</div></div>';
    }).join("");
  }

  function renderTodayLog(){
    var e=todaysEntries().slice().sort(function(a,b){return b.time<a.time?-1:(b.time>a.time?1:(b.id<a.id?-1:1));});
    if(!e.length){$("todayLog").innerHTML='<div class="empty">No calls logged yet. First dial of the day is the hardest — go.</div>';return;}
    $("todayLog").innerHTML=e.map(function(x){
      var o=CODEMAP[x.outcome];
      return '<div class="lrow"><span class="code" style="background:'+COLOR[x.outcome]+'">'+o.code+'</span>'+
        '<span class="co'+(x.company?'':' none')+'">'+(x.company?esc(x.company):"—")+'</span>'+
        '<span class="tm">'+x.time+'</span></div>';
    }).join("");
  }

  function esc(s){return String(s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}

  function renderHistory(){
    var byDay={};
    log.forEach(function(e){(byDay[e.date]=byDay[e.date]||[]).push(e);});
    var days=Object.keys(byDay).sort().reverse();
    if(!days.length){$("histTable").innerHTML='<div class="empty">No history yet.</div>';return;}
    var rows=days.map(function(d){
      var s=stat(byDay[d]);
      return '<tr><td>'+d+'</td>'+
        '<td class="'+(s.dials>=60?'dials-hit':'')+'">'+s.dials+'</td>'+
        '<td>'+s.convos+'</td><td>'+s.demos+'</td><td>'+s.vms+'</td><td>'+s.mtgs+'</td>'+
        '<td class="'+(s.closes>0?'close-hit':'')+'">'+s.closes+'</td></tr>';
    }).join("");
    $("histTable").innerHTML='<table><thead><tr><th>Date</th><th>Dials</th><th>Convos</th><th>Demos</th><th>VMs</th><th>Mtgs</th><th>Closes</th></tr></thead><tbody>'+rows+'</tbody></table>';
  }

  function renderAll(){renderScores();renderTodayLog();renderHistory();}

  var toastT;
  function toast(msg){
    var el=$("toast");el.textContent=msg;el.classList.add("show");
    clearTimeout(toastT);toastT=setTimeout(function(){el.classList.remove("show");},2600);
  }

  function logCall(outcome){
    var co=$("company").value.trim();
    log.push({id:uid(),date:today(),time:nowTime(),outcome:outcome,company:co||undefined});
    save(log);$("company").value="";
    renderAll();
    if(outcome==="close")toast("FOUNDING PARTNER CLOSED. Go ring the bell. 🔔");
    else if(outcome==="meeting")toast("Meeting booked — confirm it by text right now.");
    else toast("Logged: "+CODEMAP[outcome].label);
  }

  /* build outcome buttons */
  $("btns").innerHTML=OUTCOMES.map(function(o){
    return '<button class="ob '+o.k+'" data-k="'+o.k+'">'+(o.k==="close"?"":'<span class="dot"></span>')+o.label+'</button>';
  }).join("");
  $("btns").addEventListener("click",function(e){
    var b=e.target.closest("button[data-k]");if(b)logCall(b.getAttribute("data-k"));
  });

  $("undo").addEventListener("click",function(){
    var t=today();
    for(var i=log.length-1;i>=0;i--){if(log[i].date===t){log.splice(i,1);break;}}
    save(log);renderAll();toast("Undid last entry");
  });
  $("clear").addEventListener("click",function(){
    if(!confirm("Clear ALL of today's calls? This can't be undone."))return;
    var t=today();log=log.filter(function(e){return e.date!==t;});
    save(log);renderAll();toast("Today cleared");
  });

  $("exportCsv").addEventListener("click",function(){
    var lines=["date,time,outcome,company"];
    log.slice().sort(function(a,b){return (a.date+a.time)<(b.date+b.time)?-1:1;}).forEach(function(e){
      var c=(e.company||"").replace(/"/g,'""');
      lines.push(e.date+","+e.time+","+e.outcome+',"'+c+'"');
    });
    var blob=new Blob([lines.join("\n")],{type:"text/csv"});
    var a=document.createElement("a");a.href=URL.createObjectURL(blob);
    a.download="call-log-"+today()+".csv";a.click();URL.revokeObjectURL(a.href);
  });

  /* tabs */
  $("tabToday").addEventListener("click",function(){
    $("tabToday").classList.add("on");$("tabHist").classList.remove("on");
    $("paneToday").style.display="";$("paneHist").style.display="none";
  });
  $("tabHist").addEventListener("click",function(){
    $("tabHist").classList.add("on");$("tabToday").classList.remove("on");
    $("paneHist").style.display="";$("paneToday").style.display="none";renderHistory();
  });

  renderAll();
})();
</script>
</body>
</html>
